# Tiny sanity-check config; runs on a single GPU in a couple of minutes.
model:
  arch: ViT-B-32
  pretrained: openai
  lora_r: 4
  lora_alpha: 16
  freeze_vision: false
  freeze_text: false

data:
  shards: data/shards/tiny/*.tar
  num_workers: 2

train:
  loss: contrastive
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 0.1
  warmup: 100
  total_steps: 2000
  epoch_length: 2000
  ckpt_every: 1000
  amp: true

output_dir: runs/quickstart
